<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- MacParakeet "Cursive P" Logo
       Enclosed circular bowl with centered dot + cursive loop tail.
       P for Parakeet. Dot is the bird's eye. Loop echoes the bowl. -->

  <!-- Enclosed circular bowl -->
  <circle cx="68" cy="34" r="26" fill="none" stroke="currentColor" stroke-width="7"/>

  <!-- Stem + cursive loop tail -->
  <path d="M 42 34 L 42 82 C 42 100, 30 110, 18 112 C 6 114, 2 106, 8 98 C 14 90, 30 88, 42 92"
        fill="none" stroke="currentColor" stroke-width="7" stroke-linecap="round"/>

  <!-- Dot — bird's eye -->
  <circle cx="68" cy="34" r="6" fill="currentColor"/>
</svg>
