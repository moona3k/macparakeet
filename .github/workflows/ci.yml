name: CI

on:
  push:
    paths-ignore:
      - "docs/**"
      - "spec/**"
      - "**/*.md"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "spec/**"
      - "**/*.md"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  swift-test:
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.1"

      - name: Toolchain Versions
        run: |
          xcodebuild -version
          swift --version

      - name: Swift Test
        run: swift test --parallel
